name: Deploy Backend to Azure Container Apps

on:
  push:
    branches:
      - main
    paths:
      - 'BE/**'
      - '.github/workflows/backend-deploy.yml'
  workflow_dispatch:

env:
  REGISTRY_NAME: sitruyen
  RESOURCE_GROUP: rg-sitruyen-dev
  CONTAINER_APP_ENV_NAME: env-sitruyen-dev
  CONTAINER_APP_NAME: portfolio-api
  IMAGE_NAME: portfolio-api
  DOCKERFILE_PATH: BE_Portfolio/Dockerfile

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: az acr login --name ${{ env.REGISTRY_NAME }}

    - name: Build and Push Docker image
      working-directory: ./BE
      run: |
        IMAGE_TAG="${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}"
        IMAGE_LATEST="${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest"

        docker build -f ${{ env.DOCKERFILE_PATH }} \
          -t "$IMAGE_TAG" \
          -t "$IMAGE_LATEST" .

        docker push "$IMAGE_TAG"
        docker push "$IMAGE_LATEST"

    - name: Deploy to Azure Container Apps
      uses: azure/container-apps-deploy-action@v1
      with:
        resourceGroup: ${{ env.RESOURCE_GROUP }}
        containerAppName: ${{ env.CONTAINER_APP_NAME }}
        imageToDeploy: ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        registryUrl: ${{ env.REGISTRY_NAME }}.azurecr.io
        registryUsername: ${{ secrets.REGISTRY_USERNAME }}
        registryPassword: ${{ secrets.REGISTRY_PASSWORD }}
